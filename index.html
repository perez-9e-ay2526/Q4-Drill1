<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</head>



<body>

    <div class="mt-5">
        <h2 class="text-center">Electricity Consumption Classifier</h2><br>
        <p class="text-center">Enter the number of your kWH to see the classification of your electricity consumption.</p>
    </div>
    <br>

    <div class="container bg-light text-dark w-50 mt-5 p-3 rounded-4">

        <div class="row">
            
            <div class="col-md-4">
                <img src="https://static.vecteezy.com/system/resources/thumbnails/021/013/491/small/icon-of-energy-thunder-lightning-bolt-symbol-or-electricity-power-electric-sign-symbol-free-png.png">
            </div>

            <div class="col-md-4 text-info text-center mt-3">
                <h2><b>kWh</b></h2>
                <input type="number"class="form-control" id="inputKWH"> <!-- where the user inputs their KWH number -->
            </div>

            <div class="col-md-4 mt-5 p-3">
                <button type="button" class="btn btn-dark form-control" onclick="classifyKWH()">Consumption Classification</button>
            </div>

        </div>

    </div>

    <script src="main.js"></script>

    <footer class="footer bg-dark fixed-bottom py-3 text-white text-center">
        <p>Perez | 9-Emerald &copy; 2026</p>
    </footer>
</body>
</html>
